{% extends 'management_app/base.html' %}

{% block content %}

<div class="page-header">

<h2>

Add Announcement

</h2>

</div>

<div class="card">

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>

Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Message

</label>

<textarea
name="message"
rows="5"
class="form-control"
required>

</textarea>

</div>

<button class="btn btn-primary">

Publish

</button>

</form>

</div>

</div>

{% endblock %}
