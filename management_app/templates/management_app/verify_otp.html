{% extends 'management_app/base.html' %}

{% block auth_content %}

<div class="container mt-5">

    <div class="card p-4">

        <h3>Email Verification</h3>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="otp"
                class="form-control"
                placeholder="Enter OTP"
                required>

            <br>

            <button
                type="submit"
                class="btn btn-primary">

                Verify OTP

            </button>

        </form>

    </div>

</div>

{% endblock %}
