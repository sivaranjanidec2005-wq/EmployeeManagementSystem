{% extends 'management_app/base.html' %}

{% block content %}

<div class="page-header">

<h2>Employees</h2>

<a href="{% url 'employee_create' %}"
class="btn btn-primary">

Add Employee

</a>

</div>

<div class="card">

<div class="card-body">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>Username</th>
<th>Email</th>
<th>First Name</th>
<th>Last Name</th>

</tr>

</thead>

<tbody>

{% for employee in employees %}

<tr>

<td>

<b>

{{ employee.username }}

</b>

</td>

<td>

{{ employee.email }}

</td>

<td>

{{ employee.first_name }}

</td>

<td>

{{ employee.last_name }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
