{% extends 'management_app/base.html' %}

{% block content %}

<div class="card shadow-lg">

    <div class="card-body">

        <h3>{{ title }}</h3>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">

                Save Project

            </button>

            <a href="{% url 'project_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
